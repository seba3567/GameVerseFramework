name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # BUILD SERVER (core)
  # ============================================================
  build-server:
    name: Build server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo checkouts
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-checkouts-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-server-${{ hashFiles('**/Cargo.lock') }}

      - name: Build gameverse-core
        run: cargo build -p gameverse-core --release

      - name: Build gameverse-cli
        run: cargo build -p gameverse-cli --release

      - name: Run tests
        run: cargo test -p gameverse-core --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gameverse-server-${{ matrix.os }}
          path: |
            target/release/gameverse-server
            target/release/gameverse-cli
            target/release/gameverse.dll
            target/release/gameverse.so
            target/release/libgameverse.dylib
          if: runner.os != 'Windows' || matrix.os == 'windows-latest'

  # ============================================================
  # BUILD CLIENT
  # ============================================================
  build-client:
    name: Build client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-client-${{ hashFiles('**/Cargo.lock') }}

      - name: Build gameverse-client
        run: cargo build -p gameverse-client --release

      - name: Build UI (Tauri)
        if: matrix.os == 'windows-latest'
        run: |
          cd client/ui
          npm ci
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gameverse-client-${{ matrix.os }}
          path: target/release/gameverse-client.exe

  # ============================================================
  # BENCHMARKS
  # ============================================================
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run perf demo
        run: cargo run -p perf_demo --release

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: perf_reports/

  # ============================================================
  # RELEASE (on tag)
  # ============================================================
  release:
    name: Create Release
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup PowerShell
        if: runner.os == 'Windows'
        run: echo "Creating release for Windows"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
